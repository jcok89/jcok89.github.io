<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단어기억훈련</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:'Segoe UI','Malgun Gothic',Tahoma,sans-serif;background:linear-gradient(135deg,#ecfdf5,#f8fafc 55%,#eef2ff);color:#1f2937;display:flex;align-items:center;justify-content:center;padding:20px}.card{width:min(860px,100%);background:rgba(255,255,255,.96);border-radius:24px;padding:28px;box-shadow:0 18px 45px rgba(15,23,42,.14);border:1px solid rgba(148,163,184,.25)}.top{text-align:center}.home-link{display:inline-block;margin-bottom:14px;color:#64748b;text-decoration:none;font-weight:800}.home-link:hover{color:#047857}h1{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.04em}.description{margin:0 auto 20px;color:#64748b;line-height:1.7;max-width:700px}.panel{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:18px;margin-top:18px}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;text-align:left}label{display:block;font-weight:900;color:#334155;margin-bottom:6px;font-size:.92rem}input,select{width:100%;padding:12px 13px;border:2px solid #d1d5db;border-radius:12px;font-size:1rem;outline:none;background:white}input:focus,select:focus{border-color:#10b981}button{border:0;border-radius:12px;padding:13px 18px;font-size:1rem;font-weight:900;background:#10b981;color:white;cursor:pointer}button:hover{background:#059669}.secondary{background:#334155}.secondary:hover{background:#1f2937}.button-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}.meta{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:14px;color:#475569;font-size:.92rem}.chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#e2e8f0;font-weight:800}.word-display{margin:22px auto 14px;padding:36px 20px;border-radius:22px;background:#ecfdf5;color:#065f46;font-size:clamp(2.8rem,10vw,5.8rem);font-weight:950;letter-spacing:.04em;min-height:180px;display:flex;align-items:center;justify-content:center;text-align:center;word-break:keep-all;border:1px solid #bbf7d0}.progress,.timer{text-align:center;font-weight:900;color:#64748b;min-height:24px}.timer{color:#047857;margin-bottom:12px}.answer-grid{display:grid;gap:10px;margin:18px 0}.answer-grid input{width:100%}.result{margin-top:18px;background:#f8fafc;border-radius:18px;padding:18px;border:1px solid #e2e8f0;line-height:1.7}.result h2{text-align:center;margin:0 0 12px}.hidden{display:none}.correct{color:#047857;font-weight:900}.wrong{color:#b91c1c;font-weight:900}.pill-list{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 16px}.pill{background:#e2e8f0;border-radius:999px;padding:7px 11px;font-weight:800}.pill.hit{background:#dcfce7;color:#047857}.pill.miss{background:#fee2e2;color:#b91c1c}.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:14px 0}.summary-box{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:12px}.summary-box strong{display:block;color:#0f172a}.small-note{color:#64748b;font-size:.92rem;line-height:1.6}.chart-wrap{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:12px;margin-top:14px}canvas{width:100%;height:160px}
  </style>
</head>
<body>
  <main class="card">
    <div class="top"><a href="index.html" class="home-link">← 훈련실로 돌아가기</a><h1>단어기억훈련</h1><p class="description">오답 단어는 다음 훈련에서 더 자주 나오고, 틀린 단어는 1일·3일·7일 후 복습 대상으로 저장됩니다. 훈련 기록은 이 브라우저의 localStorage에 저장됩니다.</p></div>

    <section id="setup-section" class="panel">
      <div class="controls">
        <div><label for="word-count">단어 수</label><input type="number" id="word-count" min="1" max="50" value="7" autocomplete="off"></div>
        <div><label for="length-filter">글자 수</label><select id="length-filter"><option value="3plus" selected>3글자 이상</option><option value="4plus">4글자 이상</option><option value="4to6">4~6글자</option><option value="3to5">3~5글자</option><option value="all">전체</option></select></div>
        <div><label for="type-filter">품사</label><select id="type-filter"><option value="all" selected>전체</option><option value="명사">명사</option><option value="동사">동사</option><option value="형용사">형용사</option></select></div>
        <div><label for="level-filter">난이도</label><select id="level-filter"><option value="all" selected>전체</option><option value="초급">초급</option><option value="중급">중급</option><option value="고급">고급</option></select></div>
        <div><label for="category-filter">주제</label><select id="category-filter"><option value="all" selected>전체</option></select></div>
        <div><label for="timer-select">표시 시간</label><select id="timer-select"><option value="5">5초</option><option value="10" selected>10초</option><option value="15">15초</option><option value="0">자동 진행 끄기</option></select></div>
      </div>
      <div class="meta"><span class="chip" id="bank-status">단어 데이터 불러오는 중...</span><span class="chip" id="filter-status">필터 결과 계산 전</span><span class="chip" id="review-status">복습 0개</span><span class="chip" id="history-status">기록 0회</span></div>
      <div class="button-row"><button id="start-btn">훈련 시작</button><button class="secondary" id="review-btn" type="button">오늘 복습 시작</button><button class="secondary" id="preview-btn" type="button">필터 미리보기</button></div>
      <div class="chart-wrap"><canvas id="history-chart" width="760" height="160"></canvas></div>
      <p class="small-note" style="text-align:center;margin-bottom:0">오답은 가중치가 올라가 다음 훈련에 더 자주 섞입니다. 오늘 복습은 1·3·7일 복습 예정일이 된 단어만 모아서 진행합니다.</p>
    </section>

    <section id="memorize-section" class="hidden"><div class="progress" id="progress-text"></div><div class="word-display" id="word-display"></div><div class="timer" id="timer-text"></div><div class="button-row"><button id="next-btn">다음 단어 보기</button></div></section>
    <section id="answer-section" class="hidden panel"><p class="progress">기억나는 단어를 입력하세요. 순서는 상관없습니다.</p><div id="answer-grid" class="answer-grid"></div><div class="button-row"><button id="check-btn">채점하기</button></div></section>
    <section id="result-section" class="result hidden"></section>
  </main>

<script src="memory-utils.js"></script>
<script>
  const PROGRAM='word-memory';
  const FALLBACK_WORDS=[{"word":"가능성","type":"명사","level":"초급","category":"일상","length":3},{"word":"책임감","type":"명사","level":"초급","category":"일상","length":3},{"word":"집중력","type":"명사","level":"초급","category":"일상","length":3},{"word":"상상력","type":"명사","level":"초급","category":"일상","length":3},{"word":"불확실성","type":"명사","level":"중급","category":"사고","length":5},{"word":"우선순위","type":"명사","level":"중급","category":"사고","length":4},{"word":"요구사항","type":"명사","level":"중급","category":"업무","length":4},{"word":"아키텍처","type":"명사","level":"중급","category":"기술","length":4},{"word":"정리하다","type":"동사","level":"초급","category":"일상","length":4},{"word":"분석하다","type":"동사","level":"중급","category":"사고","length":4},{"word":"구조화하다","type":"동사","level":"중급","category":"사고","length":5},{"word":"성찰하다","type":"동사","level":"고급","category":"철학","length":4},{"word":"구체적","type":"형용사","level":"중급","category":"사고","length":3},{"word":"본질적","type":"형용사","level":"고급","category":"철학","length":3}];
  let wordBank=[],selectedWords=[],currentIndex=0,autoAdvanceTimer=null,secondsLeft=0,isReviewMode=false;
  const setupSection=document.getElementById('setup-section'),memorizeSection=document.getElementById('memorize-section'),answerSection=document.getElementById('answer-section'),resultSection=document.getElementById('result-section'),wordCountInput=document.getElementById('word-count'),lengthFilter=document.getElementById('length-filter'),typeFilter=document.getElementById('type-filter'),levelFilter=document.getElementById('level-filter'),categoryFilter=document.getElementById('category-filter'),timerSelect=document.getElementById('timer-select'),bankStatus=document.getElementById('bank-status'),filterStatus=document.getElementById('filter-status'),reviewStatus=document.getElementById('review-status'),historyStatus=document.getElementById('history-status'),progressText=document.getElementById('progress-text'),wordDisplay=document.getElementById('word-display'),timerText=document.getElementById('timer-text'),answerGrid=document.getElementById('answer-grid');
  document.getElementById('start-btn').addEventListener('click',()=>startTraining(false));document.getElementById('review-btn').addEventListener('click',()=>startTraining(true));document.getElementById('preview-btn').addEventListener('click',updateFilterStatus);document.getElementById('next-btn').addEventListener('click',showNextWord);document.getElementById('check-btn').addEventListener('click',checkAnswers);[lengthFilter,typeFilter,levelFilter,categoryFilter].forEach(c=>c.addEventListener('change',updateFilterStatus));document.addEventListener('keyup',e=>{if(e.key==='Enter'&&!memorizeSection.classList.contains('hidden'))showNextWord();});init();
  async function init(){try{const r=await fetch('word-bank.json',{cache:'no-store'});if(!r.ok)throw new Error('load failed');wordBank=normalizeWordData(await r.json());bankStatus.innerText=`단어 ${wordBank.length}개 로드됨`;}catch(e){wordBank=FALLBACK_WORDS;bankStatus.innerText=`기본 단어 ${wordBank.length}개 사용 중`;}populateCategoryFilter();updateFilterStatus();updateStatsPanel();}
  function normalizeWordData(data){if(Array.isArray(data))return data.map(i=>({...i,length:i.length||i.word.length}));if(!data||!Array.isArray(data.groups))return[];const seen=new Set(),result=[];data.groups.forEach(g=>(g.words||[]).forEach(word=>{if(seen.has(word))return;seen.add(word);result.push({word,type:g.type,level:g.level,category:g.category,length:word.length});}));return result;}
  function populateCategoryFilter(){const cats=[...new Set(wordBank.map(i=>i.category))].sort();categoryFilter.innerHTML='<option value="all" selected>전체</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');}
  function getFilteredWords(){return wordBank.filter(i=>{const l=i.length||i.word.length;const lenOk=lengthFilter.value==='all'||(lengthFilter.value==='3plus'&&l>=3)||(lengthFilter.value==='4plus'&&l>=4)||(lengthFilter.value==='4to6'&&l>=4&&l<=6)||(lengthFilter.value==='3to5'&&l>=3&&l<=5);return lenOk&&(typeFilter.value==='all'||i.type===typeFilter.value)&&(levelFilter.value==='all'||i.level===levelFilter.value)&&(categoryFilter.value==='all'||i.category===categoryFilter.value);});}
  function updateFilterStatus(){const f=getFilteredWords(),ex=shuffle(f).slice(0,5).map(i=>i.word).join(', ');filterStatus.innerText=f.length?`현재 조건 ${f.length}개 · 예: ${ex}`:'현재 조건에 맞는 단어가 없습니다';}
  function updateStatsPanel(){const s=MemoryTrainer.summary(PROGRAM);reviewStatus.innerText=`오늘 복습 ${s.due}개`;historyStatus.innerText=`기록 ${s.totalSessions}회${s.lastScore!==null?` · 최근 ${s.lastScore}점`:''}`;MemoryTrainer.drawChart('history-chart',PROGRAM);}
  function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]];}return c;}
  function uniqueByWord(items){const seen=new Set(),out=[];items.forEach(i=>{if(!i)return;const w=i.word;if(!seen.has(w)){seen.add(w);out.push(i);}});return out;}
  function clearAutoAdvanceTimer(){if(autoAdvanceTimer){clearInterval(autoAdvanceTimer);autoAdvanceTimer=null;}}
  function startAutoAdvanceTimer(){clearAutoAdvanceTimer();const s=parseInt(timerSelect.value,10);if(!s){timerText.innerText='자동 진행 꺼짐 · Enter 또는 버튼으로 이동';return;}secondsLeft=s;timerText.innerText=`자동 다음까지 ${secondsLeft}초`;autoAdvanceTimer=setInterval(()=>{secondsLeft-=1;timerText.innerText=`자동 다음까지 ${secondsLeft}초`;if(secondsLeft<=0)showNextWord();},1000);}
  function startTraining(reviewOnly){let pool;if(reviewOnly){const due=MemoryTrainer.reviewWords(PROGRAM);if(!due.length){alert('오늘 복습할 단어가 없습니다.');return;}pool=due.map(w=>wordBank.find(i=>i.word===w)||{word:w,type:'복습',level:'오답',category:'복습',length:w.length});isReviewMode=true;}else{const filtered=getFilteredWords();if(!filtered.length){alert('현재 조건에 맞는 단어가 없습니다. 필터를 바꿔 주세요.');return;}pool=MemoryTrainer.weightedPool(filtered,PROGRAM);isReviewMode=false;}const count=Math.min(Math.max(1,Math.min(50,parseInt(wordCountInput.value,10)||7)),pool.length);selectedWords=uniqueByWord(shuffle(pool)).slice(0,count);currentIndex=0;setupSection.classList.add('hidden');resultSection.classList.add('hidden');answerSection.classList.add('hidden');memorizeSection.classList.remove('hidden');showCurrentWord();}
  function showCurrentWord(){const cur=selectedWords[currentIndex];progressText.innerText=`${currentIndex+1} / ${selectedWords.length} · ${cur.type} · ${cur.level} · ${cur.category}${isReviewMode?' · 복습':''}`;wordDisplay.innerText=cur.word;document.getElementById('next-btn').innerText=currentIndex===selectedWords.length-1?'입력하러 가기':'다음 단어 보기';startAutoAdvanceTimer();}
  function showNextWord(){clearAutoAdvanceTimer();currentIndex+=1;if(currentIndex>=selectedWords.length){showAnswerInputs();return;}showCurrentWord();}
  function showAnswerInputs(){clearAutoAdvanceTimer();memorizeSection.classList.add('hidden');answerSection.classList.remove('hidden');answerGrid.innerHTML='';for(let i=0;i<selectedWords.length;i++){const input=document.createElement('input');input.type='text';input.placeholder=`${i+1}번째 기억 단어`;input.autocomplete='off';answerGrid.appendChild(input);}answerGrid.querySelector('input').focus();}
  function normalize(v){return MemoryTrainer.norm(v);}
  function checkAnswers(){clearAutoAdvanceTimer();const correctSet=new Set(selectedWords.map(i=>normalize(i.word))),userAnswers=Array.from(answerGrid.querySelectorAll('input')).map(i=>normalize(i.value)).filter(Boolean),unique=[...new Set(userAnswers)],matched=unique.filter(a=>correctSet.has(a)),missed=selectedWords.map(i=>i.word).filter(w=>!matched.includes(w));MemoryTrainer.recordSession(PROGRAM,selectedWords,matched,{review:isReviewMode});resultSection.innerHTML=`<h2>${matched.length} / ${selectedWords.length}개 정답</h2><div class="summary-grid"><div class="summary-box"><strong>품사 구성</strong>${summarize(selectedWords,'type')}</div><div class="summary-box"><strong>난이도 구성</strong>${summarize(selectedWords,'level')}</div></div><p><span class="correct">맞춘 단어:</span></p><div class="pill-list">${matched.length?matched.map(w=>`<span class="pill hit">${w}</span>`).join(''):'<span class="pill">없음</span>'}</div><p><span class="wrong">놓친 단어:</span></p><div class="pill-list">${missed.length?missed.map(w=>`<span class="pill miss">${w}</span>`).join(''):'<span class="pill hit">없음</span>'}</div><p><span class="wrong">내가 쓴 것:</span></p><div class="pill-list">${unique.length?unique.map(w=>`<span class="pill">${w}</span>`).join(''):'<span class="pill">입력 없음</span>'}</div><p class="small-note">놓친 단어는 다음 훈련에서 더 자주 나오며, 1일·3일·7일 후 복습 목록에 자동 등록됩니다.</p><div class="button-row"><button onclick="restart()">다시 하기</button></div>`;answerSection.classList.add('hidden');resultSection.classList.remove('hidden');}
  function summarize(items,key){const c=items.reduce((a,i)=>(a[i[key]]=(a[i[key]]||0)+1,a),{});return Object.entries(c).map(([n,v])=>`${n} ${v}`).join(' · ');}
  function restart(){clearAutoAdvanceTimer();selectedWords=[];currentIndex=0;resultSection.classList.add('hidden');setupSection.classList.remove('hidden');updateFilterStatus();updateStatsPanel();wordCountInput.focus();}
</script>
</body>
</html>
