<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단기기억지연훈련</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:'Segoe UI','Malgun Gothic',Tahoma,sans-serif;background:linear-gradient(135deg,#fff7ed,#f8fafc 55%,#e0f2fe);color:#1f2937;display:flex;align-items:center;justify-content:center;padding:20px}.card{width:min(860px,100%);background:rgba(255,255,255,.96);border-radius:24px;padding:28px;box-shadow:0 18px 45px rgba(15,23,42,.14);border:1px solid rgba(148,163,184,.25);text-align:center}.home-link{display:inline-block;margin-bottom:14px;color:#64748b;text-decoration:none;font-weight:800}.home-link:hover{color:#ea580c}h1{margin:0 0 10px;font-size:clamp(2rem,5vw,3rem);letter-spacing:-.04em}.description{margin:0 auto 20px;color:#64748b;line-height:1.7;max-width:720px}.panel{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:18px;margin-top:18px}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;text-align:left}label{display:block;font-weight:900;color:#334155;margin-bottom:6px;font-size:.92rem}input,select{width:100%;padding:12px 13px;border:2px solid #d1d5db;border-radius:12px;font-size:1rem;outline:none;background:white}input:focus,select:focus{border-color:#f97316}button{border:0;border-radius:12px;padding:13px 18px;font-size:1rem;font-weight:900;background:#f97316;color:white;cursor:pointer}button:hover{background:#ea580c}.secondary{background:#334155}.secondary:hover{background:#1f2937}.button-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}.stage{display:inline-flex;align-items:center;padding:7px 12px;border-radius:999px;background:#ffedd5;color:#9a3412;font-weight:900;margin-bottom:10px}.word-display{margin:20px auto 14px;padding:36px 20px;border-radius:22px;background:#fff7ed;color:#9a3412;font-size:clamp(2.8rem,10vw,5.8rem);font-weight:950;letter-spacing:.04em;min-height:180px;display:flex;align-items:center;justify-content:center;text-align:center;word-break:keep-all;border:1px solid #fed7aa}.progress,.timer{text-align:center;font-weight:900;color:#64748b;min-height:24px}.timer{color:#ea580c;margin-bottom:12px}.math-box{margin:18px auto;padding:24px;border-radius:20px;background:#eff6ff;border:1px solid #bfdbfe;max-width:560px}.math-question{font-size:clamp(2.4rem,8vw,4.6rem);font-weight:950;color:#1d4ed8;margin:12px 0}.score-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:14px 0}.score-card{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:12px}.score-card strong{display:block;font-size:1.4rem;color:#0f172a}.answer-grid{display:grid;gap:10px;margin:18px 0}.result{margin-top:18px;background:#f8fafc;border-radius:18px;padding:18px;border:1px solid #e2e8f0;line-height:1.7;text-align:left}.result h2{text-align:center;margin:0 0 12px}.hidden{display:none}.correct{color:#047857;font-weight:900}.wrong{color:#b91c1c;font-weight:900}.pill-list{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 16px}.pill{background:#e2e8f0;border-radius:999px;padding:7px 11px;font-weight:800}.pill.hit{background:#dcfce7;color:#047857}.pill.miss{background:#fee2e2;color:#b91c1c}.small-note{color:#64748b;font-size:.92rem;line-height:1.6}.chart-wrap{background:white;border:1px solid #e2e8f0;border-radius:14px;padding:12px;margin-top:14px}.meta{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:14px}.chip{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#e2e8f0;font-weight:800;color:#475569}canvas{width:100%;height:160px}
  </style>
</head>
<body>
  <main class="card">
    <a href="index.html" class="home-link">← 훈련실로 돌아가기</a>
    <h1>단기기억지연훈련</h1>
    <p class="description">단어를 기억한 뒤 30·45·60초 동안 뺄셈 중심 계산 방해 과제를 수행하고 다시 떠올립니다. 오답 단어는 다음 훈련과 1·3·7일 복습에 반영됩니다.</p>

    <section id="setup-section" class="panel">
      <div class="controls">
        <div><label for="word-count">기억할 단어 수</label><input type="number" id="word-count" min="3" max="12" value="3" autocomplete="off"></div>
        <div><label for="word-seconds">단어 표시 시간</label><select id="word-seconds"><option value="5">5초</option><option value="10" selected>10초</option><option value="0">자동 넘김 끄기</option></select></div>
        <div><label for="delay-seconds">방해 과제 시간</label><select id="delay-seconds"><option value="30" selected>30초</option><option value="45">45초</option><option value="60">60초</option></select></div>
        <div><label for="length-filter">단어 길이</label><select id="length-filter"><option value="3plus" selected>3글자 이상</option><option value="4plus">4글자 이상</option><option value="all">전체</option></select></div>
        <div><label for="math-mode">계산 난이도</label><select id="math-mode"><option value="easy" selected>쉬움</option><option value="normal">보통</option></select></div>
      </div>
      <div class="score-board"><div class="score-card"><strong id="bank-status">준비 중</strong>단어 데이터</div><div class="score-card"><strong id="delay-label">30초</strong>계산 방해</div><div class="score-card"><strong>뺄셈 多</strong>약 75%</div></div>
      <div class="meta"><span class="chip" id="review-status">복습 0개</span><span class="chip" id="history-status">기록 0회</span></div>
      <div class="button-row"><button id="start-btn">훈련 시작</button><button class="secondary" id="review-btn" type="button">오늘 복습 시작</button></div>
      <div class="chart-wrap"><canvas id="history-chart" width="760" height="160"></canvas></div>
      <p class="small-note">흐름: 단어 보기 → 계산 방해 → 지연 후 회상. 계산은 기억을 일부러 흔드는 역할입니다.</p>
    </section>

    <section id="memorize-section" class="hidden"><span class="stage">1단계 · 단어 기억</span><div class="progress" id="progress-text"></div><div class="word-display" id="word-display"></div><div class="timer" id="word-timer"></div><div class="button-row"><button id="next-word-btn">다음 단어 보기</button></div></section>
    <section id="math-section" class="hidden"><span class="stage">2단계 · 계산 방해</span><div class="timer" id="math-timer"></div><div class="math-box"><div class="math-question" id="math-question"></div><input type="number" id="math-answer" placeholder="계산 결과" autocomplete="off"><div class="button-row"><button id="submit-math-btn">제출</button></div><p class="small-note" id="math-feedback"></p></div><div class="score-board"><div class="score-card"><strong id="math-total">0</strong>푼 문제</div><div class="score-card"><strong id="math-correct">0</strong>맞힌 문제</div><div class="score-card"><strong id="sub-count">0</strong>뺄셈 문제</div></div></section>
    <section id="answer-section" class="hidden panel"><span class="stage">3단계 · 지연 후 회상</span><p class="progress">처음에 봤던 단어를 입력하세요. 순서는 상관없습니다.</p><div id="answer-grid" class="answer-grid"></div><div class="button-row"><button id="check-btn">채점하기</button></div></section>
    <section id="result-section" class="result hidden"></section>
  </main>
<script src="memory-utils.js"></script>
<script src="delayed-memory.js"></script>
</body>
</html>
